<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="images/Aurora.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css">
    <title>Aurora | Login</title>
</head>

<body class="has-sidebar">
    <!-- login section -->
    <section id="login-section">
        <div class="container">
            <h1>Login</h1>
            <div class="form-content">
                <div class="divOne">
                    <form action="" method="post" name="supportform">
                        <input type="email" name="usermail" id="usermail" placeholder="User Mail">
                        <input type="password" name="password" id="password" placeholder="Password">
                        <input type="submit" class="btn" value="Login">
                    </form>
                </div>
            </div>
            <p class="login-message success">Login successfully</p>
            <div class="accessAccount">
                <a href="addNewAccount.html">No account? Create A Account Today</a>
            </div>
        </div>
    </section>

    <!-- footer -->
    <footer>
        <div class="footer-content no-animation">
            <div class="ctn no-animation">
                <i class='bx bx-current-location'></i>
                <p>Location : Lebanon</p>
            </div>
            <div class="ctn no-animation">
                <i class='bx bx-phone'></i>
                <p>Phone : 12 345 678</p>
            </div>
            <div class="ctn no-animation">
                <i class='bx bxl-gmail'></i>
                <p>Email : contact@aurora.com.lb</p>
            </div>
        </div>
        <div class="footer-last-content no-animation">
            <p>Aurora.com.lb || all rights reserved &copy; 2026</p>
            <div class="chedilex-footer-container no-animation"></div>
            <script src="https://cdn.jsdelivr.net/gh/chedilex/chedilex-assets-footer@main/footer.js?v=1.0.2"></script>
        </div>
    </footer>

    <script src="header&footer/header.js" defer></script>
</body>

</html>
