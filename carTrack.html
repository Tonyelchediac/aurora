<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="images/Aurora.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css">
    <title>Aurora | Track Order</title>
</head>

<body class="has-sidebar">
    <script src="header&footer/header.js" defer></script>

    <!-- Tracking Section -->
    <section id="track-page-section">
        <div class="container">
            <h1 class="page-title">Track Your Vehicle</h1>
            <p class="subtitle">Real-time shipping and delivery tracking for your Aurora order.</p>

            <div class="track-container">

                <!-- item track -->
                <div class="tracked">
                    <img src="content-car-images/auroraC.png" alt="C">
                    <h4>Aurora-C-Series</h4>
                    <div class="status">
                        <h4>Status:</h4>
                        <h4>Shipped</h4>
                    </div>
                    <p>Type: SUV</p>
                    <p>Order ID: 123456789</p>
                    <p>Price: 105,000$</p>
                    <h4>Arrive: Not Before Jun 2026</h4>
                    <p class="color" style="display: flex; gap: 5px; align-items: center;">Color: <span
                            class="color-preview" style="background-color: rgb(255, 0, 0);"></span> Red
                    </p>
                    <p>Location: Lebanon</p>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
